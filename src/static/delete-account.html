<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Deletion Request</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <style>
    :root {
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: #0f172a;
      background: #f1f5f9;
      --bg: #f1f5f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #0f172a;
      --muted: #64748b;
      --brand: #4f46e5;
      --brand-hover: #4338ca;
      --danger: #dc2626;
      --success-bg: #f0fdf4;
      --success-border: #bbf7d0;
      --success-text: #166534;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --error-text: #991b1b;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      background: radial-gradient(circle at top, #e2e8f0 0%, var(--bg) 45%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    #app {
      width: min(100%, 520px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.14);
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .header {
      text-align: center;
    }

    .header .icon {
      width: 52px;
      height: 52px;
      background: #fef2f2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1rem;
      font-size: 1.5rem;
    }

    h1 {
      margin: 0 0 0.4rem;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--text);
    }

    .subtitle {
      margin: 0;
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    label {
      font-size: 0.8125rem;
      font-weight: 600;
      color: var(--text);
    }

    label .optional {
      font-weight: 400;
      color: var(--muted);
      margin-left: 0.25rem;
    }

    input[type="email"],
    textarea {
      width: 100%;
      padding: 0.625rem 0.875rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 0.9375rem;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    input[type="email"]:focus,
    textarea:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
    }

    input[type="email"].error,
    textarea.error {
      border-color: var(--danger);
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .field-error {
      font-size: 0.78rem;
      color: var(--danger);
    }

    button[type="submit"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.9375rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
    }

    button[type="submit"]:hover:not(:disabled) {
      background: var(--brand-hover);
    }

    button[type="submit"]:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .alert {
      border-radius: 12px;
      padding: 1rem 1.125rem;
      font-size: 0.875rem;
      line-height: 1.6;
    }

    .alert.success {
      background: var(--success-bg);
      border: 1px solid var(--success-border);
      color: var(--success-text);
    }

    .alert.error {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
    }

    .spinner {
      display: inline-block;
      width: 1em;
      height: 1em;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      vertical-align: middle;
      margin-right: 0.4em;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .privacy-note {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <div class="icon">🗑️</div>
      <h1>Account Deletion Request</h1>
      <p class="subtitle">
        Submit your email below to request the deletion of your personal data.
        We will process your request within 48 hours.
      </p>
    </div>

    <div v-if="result" :class="['alert', result.success ? 'success' : 'error']">
      {{ result.message }}
    </div>

    <form v-if="!result || !result.success" class="form" @submit.prevent="submit" novalidate>
      <div class="field">
        <label for="email">Email address</label>
        <input
          id="email"
          v-model="form.email"
          type="email"
          autocomplete="email"
          placeholder="you@example.com"
          :class="{ error: errors.email }"
          :disabled="loading"
        />
        <span v-if="errors.email" class="field-error">{{ errors.email }}</span>
      </div>

      <div class="field">
        <label for="reason">Reason <span class="optional">(optional)</span></label>
        <textarea
          id="reason"
          v-model="form.reason"
          placeholder="Tell us why you want to delete your account..."
          :disabled="loading"
        ></textarea>
      </div>

      <button type="submit" :disabled="loading">
        <span v-if="loading" class="spinner"></span>
        {{ loading ? 'Submitting…' : 'Request Account Deletion' }}
      </button>
    </form>

    <p class="privacy-note">
      Your request is handled in accordance with applicable data protection regulations.
    </p>
  </div>

  <script>
    const { createApp, ref, reactive } = Vue;

    createApp({
      setup() {
        const form = reactive({ email: '', reason: '' });
        const errors = reactive({ email: '' });
        const loading = ref(false);
        const result = ref(null);

        function validate() {
          errors.email = '';
          const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!form.email.trim()) {
            errors.email = 'Email is required.';
            return false;
          }
          if (!emailRegex.test(form.email.trim())) {
            errors.email = 'Please enter a valid email address.';
            return false;
          }
          return true;
        }

        async function submit() {
          if (!validate()) return;

          loading.value = true;
          result.value = null;

          try {
            const body = { email: form.email.trim().toLowerCase() };
            if (form.reason.trim()) body.reason = form.reason.trim();

            const response = await fetch('/api/account-deletion/request', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(body),
            });

            const data = await response.json();

            if (response.ok && data.success) {
              result.value = { success: true, message: data.message };
            } else {
              result.value = {
                success: false,
                message: data.error || 'Something went wrong. Please try again.',
              };
            }
          } catch (err) {
            result.value = {
              success: false,
              message: 'Network error. Please check your connection and try again.',
            };
          } finally {
            loading.value = false;
          }
        }

        return { form, errors, loading, result, submit };
      },
    }).mount('#app');
  </script>
</body>
</html>
